# 全球云智算 Nginx 配置 (HTTPS)
# 域名: juxinsuanli.cn
# 服务器 IP: 123.57.226.180

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name juxinsuanli.cn www.juxinsuanli.cn api.juxinsuanli.cn;
    return 301 https://$host$request_uri;
}

# 主域名 - 管理后台 (HTTPS)
server {
    listen 443 ssl;
    server_name juxinsuanli.cn www.juxinsuanli.cn;
    http2 on;
    client_max_body_size 10M;

    # SSL 证书配置
    ssl_certificate /www/wwwroot/LD-AI/juxinsuanli.cn.pem;
    ssl_certificate_key /www/wwwroot/LD-AI/juxinsuanli.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /www/wwwroot/LD-AI/admin/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ========== 微信校验文件 ==========
    # 微信域名校验文件（直接从项目根目录读取）
    location ~* ^/[a-zA-Z0-9]+\.txt$ {
        root /www/wwwroot/LD-AI;
        default_type text/plain;
    }
    
    # ========== 图片上传目录 (新增) ==========
    location /uploads/ {
        # 注意: 这里直接指向我们刚才找到的实际上传目录
        # 如果是软连接方式，可以指向 /www/wwwroot/LD-AI/uploads/
        # 但为了稳妥，我们直接指向真实的 backend 目录
        alias /www/wwwroot/LD-AI/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 静态资源缓存 - 注意排除 uploads，以免匹配冲突，不过因为有上面的具体 location，优先级会高于这个正则
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 终端隧道代理
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# API 服务 - api.juxinsuanli.cn (HTTPS) - 小程序使用
server {
    listen 443 ssl;
    server_name api.juxinsuanli.cn;
    http2 on;
    client_max_body_size 10M;

    # SSL 证书配置
    ssl_certificate /www/wwwroot/LD-AI/juxinsuanli.cn.pem;
    ssl_certificate_key /www/wwwroot/LD-AI/juxinsuanli.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # ========== 微信校验文件 ==========
    location ~* ^/[a-zA-Z0-9]+\.txt$ {
        root /www/wwwroot/LD-AI;
        default_type text/plain;
    }
    
    # ========== 图片上传目录 (新增，确保 api 域名也能访问图片) ==========
    location /uploads/ {
        alias /www/wwwroot/LD-AI/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        
        # 允许跨域
        add_header Access-Control-Allow-Origin * always;
    }

    location / {
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With' always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With' always;
    }
}

# 备用：IP + 端口访问（无 SSL）
server {
    listen 8081;
    server_name _;

    root /www/wwwroot/LD-AI/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
