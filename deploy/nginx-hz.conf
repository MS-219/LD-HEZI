# 全球云智算 Nginx 配置 (HTTPS)
# 域名: hz.shandongliandong.com
# 服务器: 103.163.47.83（新服务器）
# 后端端口: 8090（该服务器 8080 已被其他容器占用，
#   部署时用 SERVER_PORT=8090 ./deploy-docker.sh deploy 启动后端）
# 证书: Let's Encrypt（certbot 自动签发，路径为 /etc/letsencrypt/live/...）
#
# 使用方法见 deploy/新服务器部署指南.md

# HTTP：放行 ACME 验证，其余重定向到 HTTPS
server {
    listen 80;
    server_name hz.shandongliandong.com;

    # certbot webroot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hz.shandongliandong.com;

    # SSL 证书（certbot 签发后自动生成）
    ssl_certificate /etc/letsencrypt/live/hz.shandongliandong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hz.shandongliandong.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 管理后台（如不在此域名下开放后台，可删除 root/index 和 SPA location）
    root /www/wwwroot/LD-HEZI/admin/dist;
    index index.html;

    # 上传文件（头像/收款码/反馈图片等），直接由 Nginx 提供
    location /uploads/ {
        alias /www/wwwroot/LD-HEZI/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 静态资源缓存（uploads 已由上面更具体的 location 接管）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端（App / 小程序 / 管理后台共用）
    location /api {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20m;
    }

    # WebSocket（设备终端隧道）
    location /ws/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
