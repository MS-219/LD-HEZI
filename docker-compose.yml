services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qqyzs-backend:${IMAGE_TAG:-latest}
    container_name: qqyzs-backend
    network_mode: host
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      JAVA_OPTS: "${JAVA_OPTS:-}"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:mysql://127.0.0.1:3307/ldhezi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-ldhezi}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-ldhezi}"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-80}"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-10}"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-10000}"
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD: "${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:-20000}"
      IP2REGION_XDB_PATH: "/app/ip2region.xdb"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://hz.shandongliandong.com,https://juxinsuanli.cn,https://www.juxinsuanli.cn,https://ld.juxinsuanli.cn,https://api.juxinsuanli.cn}"
      ALIBABA_CLOUD_ACCESS_KEY_ID: "${ALIBABA_CLOUD_ACCESS_KEY_ID:-}"
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: "${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}"
      ALIYUN_SMS_SIGN_NAME: "${ALIYUN_SMS_SIGN_NAME:-成都联动云芯数字科技}"
      ALIYUN_SMS_TEMPLATE_CODE: "${ALIYUN_SMS_TEMPLATE_CODE:-SMS_336585113}"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./device_agent:/device_agent:ro
